name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install Python 3.13. on the CI VM
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.7"
      # Install ruff, pyright, pytest
      - run: pip install -r requirements.txt
      - run: make install
      # run the full suite
      - run: make check
